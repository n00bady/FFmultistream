{{define "body"}}
<h2>Add destination</h2>
<div class="card card-pad">
  <form method="post" action="/origins/{{.OriginID}}/destinations">
    <div class="form-row">
      <label for="rtmp">RTMP URL</label>
      <input type="text" name="rtmp" id="rtmp" placeholder="rtmp://a.rtmp.youtube.com/live2" autofocus required>
    </div>
    <div class="form-row">
      <label for="key">Stream key</label>
      <input type="text" name="key" id="key" placeholder="xxxx-xxxx-xxxx-xxxx" required>
    </div>
    <div class="form-actions">
      <input type="submit" class="primary" value="Add destination">
      <a class="btn ghost" href="/">Cancel</a>
    </div>
  </form>
</div>
{{end}}
{{template "base" .}}
