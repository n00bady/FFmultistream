{{define "body"}}
<h2>Edit destination</h2>
<div class="card card-pad">
  <form method="post" action="/destinations/{{.Index}}">
    <div class="form-row">
      <label for="rtmp">RTMP URL</label>
      <input type="text" name="rtmp" id="rtmp" value="{{.RTMP}}" required>
    </div>
    <div class="form-row">
      <label for="key">Stream key</label>
      <input type="text" name="key" id="key" value="{{.Key}}" required>
    </div>
    <div class="form-actions">
      <input type="submit" class="primary" value="Save changes">
      <a class="btn ghost" href="/">Cancel</a>
    </div>
  </form>
</div>
{{end}}
{{template "base" .}}
