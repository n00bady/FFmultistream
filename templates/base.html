{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FFmultistream</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 820px; margin: 2em auto; padding: 0 1em; color: #222; background: #fafafa; }
  header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #ddd; padding-bottom: .5em; margin-bottom: 1em; }
  header h1 { margin: 0; font-size: 1.4em; }
  nav a { margin-left: 1em; color: #1565c0; text-decoration: none; }
  nav a:hover { text-decoration: underline; }
  .status { padding: .6em 1em; border-radius: 4px; margin-bottom: 1em; display: flex; justify-content: space-between; align-items: center; }
  .status.running { background: #e8f5e9; color: #1b5e20; }
  .status.stopped { background: #ffebee; color: #b71c1c; }
  .flash { padding: .5em 1em; border-radius: 4px; margin-bottom: 1em; background: #e3f2fd; color: #0d47a1; }
  .flash.err { background: #ffebee; color: #b71c1c; }
  table { width: 100%; border-collapse: collapse; background: #fff; }
  th, td { padding: .55em .6em; text-align: left; border-bottom: 1px solid #eee; vertical-align: middle; }
  th { font-size: .8em; color: #555; text-transform: uppercase; letter-spacing: .03em; }
  .actions { display: flex; gap: .5em; align-items: center; }
  button, input[type=submit] { padding: .4em .9em; border: 1px solid #ccc; background: #f5f5f5; cursor: pointer; border-radius: 3px; font-size: .9em; }
  button.danger, input[type=submit].danger { background: #ffebee; border-color: #ef5350; color: #b71c1c; }
  button.primary, input[type=submit].primary { background: #e8f5e9; border-color: #66bb6a; color: #1b5e20; }
  input[type=text] { padding: .45em; border: 1px solid #ccc; border-radius: 3px; width: 100%; box-sizing: border-box; font-family: inherit; font-size: .95em; }
  .form-row { margin-bottom: .8em; }
  label { display: block; font-size: .85em; color: #555; margin-bottom: .2em; }
  pre.logs { background: #1e1e1e; color: #d4d4d4; padding: 1em; overflow-x: auto; font-size: .8em; max-height: 60vh; }
  form.inline { display: inline; margin: 0; }
  code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: .9em; }
  h2 { margin-top: 1.6em; font-size: 1.1em; border-bottom: 1px solid #eee; padding-bottom: .25em; }
  .muted { color: #888; font-size: .9em; }
  .panel { background: #fff; border: 1px solid #eee; border-radius: 4px; padding: 1em; }
</style>
</head>
<body>
<header>
  <h1>FFmultistream</h1>
  <nav>
    <a href="/">Home</a>
    <a href="/settings">Settings</a>
    <a href="/logs">Logs</a>
  </nav>
</header>
{{if .Flash}}<div class="flash">{{.Flash}}</div>{{end}}
{{if .FlashErr}}<div class="flash err">{{.FlashErr}}</div>{{end}}
{{block "body" .}}{{end}}
</body>
</html>
{{end}}
